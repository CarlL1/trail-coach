<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Trail Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0906;
      --surface:  #131109;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0ede8;
      --muted:    rgba(240,237,232,0.38);
      --accent:   #ff6b35;
      --accent2:  #ff3d00;
      --card-bg:  rgba(255,255,255,0.025);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 10;
      background: rgba(11,9,6,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px env(safe-area-inset-top);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
    .logo-sub  { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-top: 1px; }
    .days-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 7px 10px;
      outline: none; cursor: pointer;
    }

    /* ── Main ── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 14px calc(env(safe-area-inset-bottom) + 20px);
    }

    /* ── Loading / empty ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 2px solid rgba(255,107,53,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      margin: 0 0 10px;
    }
    .section-label.muted { color: var(--muted); margin-top: 24px; }

    /* ── Activity card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; margin-bottom: 12px;
    }
    .card-name {
      font-size: 14px; font-weight: 600; line-height: 1.3;
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .analyze-btn {
      flex-shrink: 0;
      background: rgba(255,107,53,0.15);
      border: 1px solid rgba(255,107,53,0.4);
      border-radius: 8px;
      color: var(--accent);
      font-family: 'Sora', sans-serif;
      font-size: 12px; font-weight: 600;
      padding: 7px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .analyze-btn:not(:disabled):active { background: rgba(255,107,53,0.28); }

    /* ── Stat pills ── */
    .stats {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .pill {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      padding: 8px 11px;
      min-width: 64px; text-align: center;
    }
    .pill.hi {
      background: rgba(255,107,53,0.1);
      border-color: rgba(255,107,53,0.3);
    }
    .pill-val {
      font-family: 'DM Mono', monospace;
      font-size: 15px; font-weight: 500;
      color: var(--text);
    }
    .pill.hi .pill-val { color: var(--accent); }
    .pill-unit { font-size: 10px; opacity: 0.5; margin-left: 1px; }
    .pill-label { font-size: 9px; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Comment box ── */
    .comment-box {
      margin-top: 14px;
      padding: 13px 14px;
      background: rgba(255,107,53,0.055);
      border: 1px solid rgba(255,107,53,0.18);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    .comment-header {
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      color: var(--accent); margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .comment-text {
      font-size: 13px; line-height: 1.75;
      color: rgba(240,237,232,0.82);
      white-space: pre-wrap;
    }
    .post-btn {
      margin-top: 10px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      color: var(--muted);
      font-family: 'Sora', sans-serif;
      font-size: 11px; padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .post-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .post-btn.posted { color: #4caf7d; border-color: rgba(76,175,125,0.3); }

    /* ── Error ── */
    .error-msg {
      background: rgba(255,60,60,0.1);
      border: 1px solid rgba(255,60,60,0.25);
      border-radius: 10px;
      color: #ff6b6b;
      font-size: 13px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⛰</div>
    <div>
      <div class="logo-text">Trail Coach</div>
      <div class="logo-sub">WHISTLER 50K · INTERVALS.ICU</div>
    </div>
  </div>
  <select class="days-select" id="daysSelect" onchange="loadActivities()">
    <option value="14">14 days</option>
    <option value="30" selected>30 days</option>
    <option value="60">60 days</option>
    <option value="90">90 days</option>
  </select>
</header>

<main id="main">
  <div class="state-msg">
    <div class="spinner"></div><br/>Loading your activities…
  </div>
</main>

<script>
const comments  = {};
const postState = {};

function fmt(secs) {
  const m = Math.floor(secs / 60), s = Math.round(secs % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function buildCard(a) {
  const distKm  = a.distance ? (a.distance / 1000).toFixed(1) : null;
  const elevM   = a.total_elevation_gain ? Math.round(a.total_elevation_gain) : null;
  const durMin  = a.moving_time ? Math.round(a.moving_time / 60) : null;
  const hrAvg   = a.average_heartrate ? Math.round(a.average_heartrate) : null;
  const pace    = (a.moving_time && a.distance) ? fmt(a.moving_time / (a.distance / 1000)) : null;
  const icon    = {Run:'🏃',TrailRun:'🏔',Hike:'🥾',Ride:'🚴',Swim:'🏊'}[a.type] || '⚡';

  let dateStr = '';
  try {
    const d = new Date((a.start_date_local || a.start_date).replace('Z',''));
    dateStr = d.toLocaleDateString('en-CA', {weekday:'short', month:'short', day:'numeric'});
  } catch(e) {}

  const pills = [
    distKm ? `<div class="pill"><div class="pill-val">${distKm}<span class="pill-unit">km</span></div><div class="pill-label">Dist</div></div>` : '',
    elevM  ? `<div class="pill hi"><div class="pill-val">${elevM}<span class="pill-unit">m</span></div><div class="pill-label">Elev</div></div>` : '',
    durMin ? `<div class="pill"><div class="pill-val">${durMin}<span class="pill-unit">m</span></div><div class="pill-label">Time</div></div>` : '',
    hrAvg  ? `<div class="pill"><div class="pill-val">${hrAvg}<span class="pill-unit">bpm</span></div><div class="pill-label">HR</div></div>` : '',
    pace   ? `<div class="pill"><div class="pill-val">${pace}<span class="pill-unit">/k</span></div><div class="pill-label">Pace</div></div>` : '',
  ].filter(Boolean).join('');

  return `
  <div class="card" id="card-${a.id}">
    <div class="card-top">
      <div style="min-width:0;flex:1">
        <div class="card-name">${icon} ${a.name || 'Untitled'}</div>
        <div class="card-meta">${dateStr} · ${a.type || 'Run'}</div>
      </div>
      <button class="analyze-btn" id="btn-${a.id}" onclick="analyze(${JSON.stringify(a).replace(/"/g,'&quot;')})">
        ✦ Analyze
      </button>
    </div>
    <div class="stats">${pills}</div>
    <div id="comment-${a.id}"></div>
  </div>`;
}

async function loadActivities() {
  const days = document.getElementById('daysSelect').value;
  document.getElementById('main').innerHTML = `
    <div class="state-msg"><div class="spinner"></div><br/>Fetching activities…</div>`;

  try {
    const res  = await fetch(`/api/activities?days=${days}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const RUN_TYPES = new Set(['Run','TrailRun','Hike','VirtualRun']);
    const runs  = data.filter(a => RUN_TYPES.has(a.type));
    const other = data.filter(a => !RUN_TYPES.has(a.type));

    if (!data.length) {
      document.getElementById('main').innerHTML =
        `<div class="state-msg">No activities found in the last ${days} days.</div>`;
      return;
    }

    let html = '';
    if (runs.length) {
      html += `<p class="section-label">✦ Runs & Hikes (${runs.length})</p>`;
      html += runs.map(buildCard).join('');
    }
    if (other.length) {
      html += `<p class="section-label muted">Other Activities (${other.length})</p>`;
      html += other.map(buildCard).join('');
    }
    document.getElementById('main').innerHTML = html;
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}

async function analyze(activity) {
  const btn = document.getElementById(`btn-${activity.id}`);
  const box = document.getElementById(`comment-${activity.id}`);
  btn.disabled = true;
  btn.textContent = 'Analyzing…';
  box.innerHTML = '';

  try {
    const res  = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(activity),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    comments[activity.id] = data.comment;
    box.innerHTML = `
      <div class="comment-box">
        <div class="comment-header">
          <span>✦ COACH ANALYSIS</span>
        </div>
        <div class="comment-text">${data.comment.replace(/</g,'&lt;')}</div>
        <button class="post-btn" id="post-${activity.id}"
          onclick="postComment('${activity.id}')">
          ↑ Post to Intervals.icu
        </button>
      </div>`;
    btn.textContent = '↺ Re-analyze';
  } catch(e) {
    box.innerHTML = `<div class="error-msg" style="margin-top:12px">⚠ ${e.message}</div>`;
    btn.textContent = '✦ Analyze';
  }
  btn.disabled = false;
}

async function postComment(activityId) {
  const btn = document.getElementById(`post-${activityId}`);
  btn.disabled = true;
  btn.textContent = 'Posting…';
  try {
    const res  = await fetch('/api/post-comment', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({activity_id: activityId, comment: comments[activityId]}),
    });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = '✓ Posted!';
      btn.classList.add('posted');
    } else {
      btn.textContent = '⚠ Failed — check permissions';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = '⚠ Error';
    btn.disabled = false;
  }
}

loadActivities();
</script>
</body>
</html>
